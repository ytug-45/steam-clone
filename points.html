<!-- points.html - Пункты магазина -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пункты магазина - Steam</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg-primary:#171a21;--bg-secondary:#1b2838;--accent:#66c0f4;--text-primary:#c7d5e0;--text-secondary:#8f98a0;--border-color:rgba(255,255,255,0.1);--card-bg:#16202d}
        [data-theme="light"]{--bg-primary:#f5f5f5;--bg-secondary:#ffffff;--accent:#1a9fff;--text-primary:#333333;--text-secondary:#666666;--border-color:rgba(0,0,0,0.1);--card-bg:#ffffff}
        body{font-family:"Motiva Sans",Helvetica,Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
        .header{background:#171a21;padding:0 20px;position:sticky;top:0;z-index:1000}
        .header-content{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px}
        .logo{color:#c7d5e0;text-decoration:none;font-size:22px;font-weight:600}
        .nav{display:flex;gap:20px}
        .nav a{color:#c7d5e0;text-decoration:none;text-transform:uppercase;font-size:13px;padding:5px 10px}
        .nav a.active{color:#66c0f4;border-bottom:2px solid #66c0f4}
        .main-container{max-width:1000px;margin:30px auto;padding:0 20px}
        .points-header{background:linear-gradient(135deg,var(--bg-secondary),var(--bg-tertiary));padding:40px;border-radius:3px;text-align:center;margin-bottom:40px;border:1px solid var(--border-color)}
        .points-balance{font-size:48px;color:var(--accent);font-weight:600;margin-bottom:10px}
        .points-label{color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px}
        .section-title{font-size:20px;margin-bottom:20px;color:var(--accent);text-transform:uppercase}
        .rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-bottom:40px}
        .reward-card{background:var(--card-bg);border-radius:3px;padding:20px;text-align:center;border:1px solid var(--border-color);transition:all 0.2s;cursor:pointer}
        .reward-card:hover{border-color:var(--accent);transform:translateY(-3px)}
        .reward-icon{font-size:40px;margin-bottom:10px}
        .reward-name{font-size:14px;margin-bottom:5px}
        .reward-cost{color:var(--accent);font-weight:600}
        .theme-toggle{position:fixed;bottom:30px;right:30px;background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-primary);width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:20px;z-index:100}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">STEAM</a>
            <nav class="nav">
                <a href="index.html">Магазин</a>
                <a href="library.html">Библиотека</a>
                <a href="community.html">Сообщество</a>
                <a href="profile.html">Профиль</a>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <div class="points-header">
            <div class="points-balance" id="pointsBalance">0</div>
            <div class="points-label">Пунктов магазина</div>
        </div>

        <h2 class="section-title">Аватары</h2>
        <div class="rewards-grid">
            <div class="reward-card" onclick="buyReward(100,'Аватар 1')">
                <div class="reward-icon">🎮</div>
                <div class="reward-name">Геймер</div>
                <div class="reward-cost">100 pts</div>
            </div>
            <div class="reward-card" onclick="buyReward(200,'Аватар 2')">
                <div class="reward-icon">🏆</div>
                <div class="reward-name">Чемпион</div>
                <div class="reward-cost">200 pts</div>
            </div>
            <div class="reward-card" onclick="buyReward(150,'Аватар 3')">
                <div class="reward-icon">🎯</div>
                <div class="reward-name">Снайпер</div>
                <div class="reward-cost">150 pts</div>
            </div>
        </div>

        <h2 class="section-title">Рамки профиля</h2>
        <div class="rewards-grid">
            <div class="reward-card" onclick="buyReward(500,'Рамка 1')">
                <div class="reward-icon">✨</div>
                <div class="reward-name">Золотая</div>
                <div class="reward-cost">500 pts</div>
            </div>
            <div class="reward-card" onclick="buyReward(300,'Рамка 2')">
                <div class="reward-icon">🔥</div>
                <div class="reward-name">Огненная</div>
                <div class="reward-cost">300 pts</div>
            </div>
        </div>

        <h2 class="section-title">Анимированные стикеры</h2>
        <div class="rewards-grid">
            <div class="reward-card" onclick="buyReward(1000,'Стикер 1')">
                <div class="reward-icon">🐉</div>
                <div class="reward-name">Дракон</div>
                <div class="reward-cost">1000 pts</div>
            </div>
            <div class="reward-card" onclick="buyReward(800,'Стикер 2')">
                <div class="reward-icon">🦄</div>
                <div class="reward-name">Единорог</div>
                <div class="reward-cost">800 pts</div>
            </div>
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <script>
        let isDarkTheme=true;
        let points=parseInt(localStorage.getItem('points')||'0');
        
        function loadTheme(){const savedTheme=localStorage.getItem('theme')||'dark';isDarkTheme=savedTheme==='dark';document.body.setAttribute('data-theme',savedTheme);document.querySelector('.theme-toggle').textContent=isDarkTheme?'🌙':'☀️'}
        function toggleTheme(){isDarkTheme=!isDarkTheme;const theme=isDarkTheme?'dark':'light';document.body.setAttribute('data-theme',theme);localStorage.setItem('theme',theme);document.querySelector('.theme-toggle').textContent=isDarkTheme?'🌙':'☀️'}
        
        function updatePoints(){document.getElementById('pointsBalance').textContent=points}
        function buyReward(cost,name){if(points>=cost){points-=cost;localStorage.setItem('points',points);updatePoints();alert(`Куплено: ${name}`)}else{alert('Недостаточно пунктов!')}}
        
        loadTheme();
        updatePoints();
    </script>
</body>
</html>
